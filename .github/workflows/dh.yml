name: "Publish Docker image to Docker Hub"
on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            branch:
                description: Branch to build from
                type: string
                required: false
                default: "main"
            custom_tag:
                description: Custom tag to add (optional)
                type: string
                required: false

jobs:
    build:
        runs-on: "ubuntu-latest"
        steps:
            # submodules: 'true' is required — the Dockerfile builds the native
            # Opus addon from the libopus submodule (src/OpusDecoder/opus) inside
            # the image, so it must be present in the build context. The image is
            # self-contained: it compiles the addon and bundles the server itself,
            # for both linux/amd64 and linux/arm64, so no host-side build is needed.
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
              with:
                  ref: ${{ inputs.branch || github.ref }}
                  submodules: 'true'

            # The WASM Opus artifacts are architecture-independent and are built on the runner
            # (native amd64, no emulation) and copied into the image; the native addon is compiled
            # per-arch inside the Dockerfile. See the Dockerfile header for why WASM isn't built in-image.
            - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
              with:
                  node-version: 22

            - name: Install autotools (for libopus autogen under Emscripten)
              run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool make

            - name: Setup Emscripten SDK
              run: |
                  wget -q https://github.com/emscripten-core/emsdk/archive/main.zip
                  unzip -q main.zip
                  cd emsdk-main
                  ./emsdk install 4.0.20
                  ./emsdk activate 4.0.20
                  echo "EMSDK=$PWD" >> $GITHUB_ENV

            - name: Build WASM Opus modules
              run: |
                  source "$EMSDK/emsdk_env.sh"
                  npm run configure
                  npm run build:wasm

            - name: Login to Docker Hub
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

            - name: Generate Docker tags
              id: meta
              run: |
                  SHORT_SHA="${{ github.sha }}"
                  SHORT_SHA="${SHORT_SHA:0:7}"
                  TAGS="jitsi/opus-transcriber-proxy:${{ github.sha }},jitsi/opus-transcriber-proxy:$SHORT_SHA"
                  if [ "${{ inputs.branch }}" = "main" ] || [ "${{ inputs.branch }}" = "" ]; then
                    TAGS="$TAGS,jitsi/opus-transcriber-proxy:latest"
                  fi
                  if [ -n "${{ inputs.custom_tag }}" ]; then
                    TAGS="$TAGS,jitsi/opus-transcriber-proxy:${{ inputs.custom_tag }}"
                  fi
                  echo "tags=$TAGS" >> $GITHUB_OUTPUT

            - name: Build and push Docker image
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
              with:
                  context: ./
                  platforms: linux/amd64,linux/arm64
                  pull: true
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
