name: "Run tests"
on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

jobs:
    test:
        runs-on: "ubuntu-latest"
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
              with:
                  submodules: 'true'

            - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            # Compiles libopus + the N-API addon (build/Release/opus_native.node).
            # ubuntu-latest already ships gcc/g++/make/python3 for node-gyp.
            - name: Build native Opus addon
              run: npm run build:native

            - name: Run tests
              run: npm test
